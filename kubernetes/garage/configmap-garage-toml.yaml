---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  # Secrets (rpc_secret / admin_token) volontairement absents : fournis par les
  # variables d'environnement GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN, qui
  # surchargent ce fichier (voir garage-secrets-sealed.yaml + le StatefulSet).
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"
    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "127.0.0.1:3901"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.local"

    [admin]
    api_bind_addr = "[::]:3903"
