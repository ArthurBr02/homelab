apiVersion: v1
kind: ConfigMap
metadata:
  name: ba-tb-config
  namespace: ba-tb
data:
  DB_HOST: ba-tb-db-rw
  DB_PORT: "5432"
  DB_DB: ba-tb
  LOG_LEVEL: INFO
  INACTIVITY_TIMEOUT: "300"
  ALONE_TIMEOUT: "300"
  CONNECTION_TIMEOUT: "10"
  MISTRAL_MODEL: mistral-large-latest
  MISTRAL_MAX_TOKENS: "10000"
  MISTRAL_TEMPERATURE: "0.7"
  COMMAND_PREFIX: "!"
